services:
  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
  dashboard:
    build:
      context: .
      dockerfile: deploy/Dockerfile.dashboard
    env_file: .env
    ports:
      - "8501:8501"
    depends_on:
      - api
  worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile.worker
    env_file: .env
    depends_on:
      - db
      - redis
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trading
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pg_data:
